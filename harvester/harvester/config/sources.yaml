# Source configuration for the harvester.
# Each entry maps a source_id to fetcher metadata, ETL identifier, default
# query, and runtime tunables.

federal_register:
  fetcher: harvester.fetchers.federal_register.FederalRegisterFetcher
  etl: harvester.etl.federal_register.FederalRegisterETL
  rolling_window_days: 60
  # Threshold for staging/YYYY-MM/ — run pauses if exceeded. Bumped from 500
  # to 5000 because output now lands directly in staging (no drain step) and
  # the initial backfill from a 60-day FR window already produced ~250 files.
  inbox_backpressure_max: 50000
  daily_cost_ceiling_usd: 0.00
  # validate_count.py — alert fires when fraction of FR deposits with
  # precision_match=true falls below this threshold over the validation
  # window. The 2026-05-18 backfill showed actual precision was 2% (6/294)
  # because the FR API's conditions[term] does fulltext across many fields
  # (agencies, doc type, action) — broader than just title+abstract. The
  # threshold is set generously so the alert fires only on real degradation
  # of the precision-tagging signal, not the current steady-state.
  precision_alert_threshold: 0.30
  validation_window_days: 30
  tier_1_terms:
    - "artificial intelligence"
    - "machine learning"
    - "generative AI"
    - "automated decision"
    - "algorithmic"
    - "AI risk management"
    - "AI safety"
    - "foundation model"
  tier_2_terms:
    - "Executive Order 14110"
    - "Executive Order 14179"
    - "OMB M-24-10"
    - "NIST AI"
    - "AI governance"
    - "automated systems"
  document_types:
    - "RULE"
    - "PRORULE"
    - "NOTICE"
    - "PRESDOCU"

arxiv:
  fetcher: harvester.fetchers.arxiv.ArxivFetcher
  etl: harvester.etl.arxiv.ArxivETL
  rolling_window_days: 30
  inbox_backpressure_max: 50000
  daily_cost_ceiling_usd: 5.00
  expected_schema_version: 5
  triage_enabled: true
  citation_chain_enabled: true   # arxiv papers seed citation chains
  triage_threshold: 0.4
  triage_model: "claude-sonnet-4-6"
  scout_base_url: "https://arxiv.org"
  categories:
    # Core AI / ML categories
    - "cs.AI"
    - "cs.LG"
    - "cs.CL"
    - "stat.ML"
    # Economics measurement
    - "econ.GN"
    - "econ.EM"
    # Control / dynamics
    - "math.OC"
    - "stat.AP"
  # Tier-1 keywords folded in from ~/.wintermute/sources/paper_keywords.yaml
  tier_1_terms:
    - "knowledge graph agent"
    - "agent memory architecture"
    - "RAG retrieval augmented generation"
    - "entity extraction named entity recognition"
    - "research reproducibility provenance"
    - "survey methodology federal statistics"
    - "MCP model context protocol tool use"
    - "meta-learning few-shot"
    - "graph neural network knowledge base"
    - "multi-agent coordination planning"
    - "document understanding information extraction"
    - "research pipeline automation"
    - "entity resolution record linkage"
    - "knowledge graph deduplication entity alignment"
    - "confidence threshold entity matching"
    - "TAC-KBP knowledge base population"
    - "OAEI ontology alignment evaluation"
    - "knowledge graph completion link prediction"
    - "belief revision knowledge base update AGM"
  tier_2_terms: []

semantic_scholar:
  fetcher: harvester.fetchers.semantic_scholar.SemanticScholarFetcher
  etl: harvester.etl.semantic_scholar.SemanticScholarETL
  rolling_window_days: 365   # search broad
  inbox_backpressure_max: 50000
  expected_schema_version: 6
  triage_enabled: true
  triage_threshold: 0.4
  triage_model: "claude-sonnet-4-6"
  scout_base_url: "https://api.semanticscholar.org"
  citation_chain_enabled: false   # Standalone runs don't enqueue further citations
  tier_1_terms:
    - "knowledge graph agent"
    - "agent memory architecture"
    - "entity resolution"
    - "research reproducibility provenance"
    - "survey methodology federal statistics"
    - "diffusion model latent geometry"
    - "Wasserstein distributionally robust optimization"
  tier_2_terms: []

zenodo:
  fetcher: harvester.fetchers.zenodo.ZenodoFetcher
  etl: harvester.etl.zenodo.ZenodoETL
  rolling_window_days: 30
  inbox_backpressure_max: 50000
  daily_cost_ceiling_usd: 5.00
  expected_schema_version: 8
  triage_enabled: true
  citation_chain_enabled: true
  triage_threshold: 0.4
  triage_model: "claude-sonnet-4-6"
  scout_base_url: "https://zenodo.org"
  per_page: 25                # Zenodo's unauthenticated API caps at 25 per page (returns 400 above)
  max_pages: 4                # 25 * 4 = 100 max per term per run
  tier_1_terms:
    - "stochastic differential equations"
    - "diffusion model"
    - "information geometry"
    - "Wasserstein distributionally robust optimization"
    - "Fokker-Planck"
    - "score-based generative model"
    - "uncertainty quantification deep learning"
    - "neural SDE"
    - "latent space geometry"
    - "model calibration probabilistic"
    - "canine cognition"
    - "dog behavior training"
    - "BJJ Brazilian jiu-jitsu"
    - "MMA training science"
    - "strength training hypertrophy"
    - "performance psychology grit"
    - "flow state athletes"
    - "Shannon information theory"
    - "control systems PID"
    - "symbolic AI knowledge graph"
  tier_2_terms: []

url_drain:
  fetcher: harvester.fetchers.url_drain.UrlDrainFetcher
  etl: harvester.etl.url_drain.UrlDrainETL
  inbox_backpressure_max: 50000
  daily_cost_ceiling_usd: 5.00
  expected_schema_version: 9
  triage_enabled: true
  citation_chain_enabled: false
  triage_threshold: 0.4
  triage_model: "claude-sonnet-4-6"

pubmed:
  fetcher: harvester.fetchers.pubmed.PubMedFetcher
  etl: harvester.etl.pubmed.PubMedETL
  rolling_window_days: 30
  inbox_backpressure_max: 50000
  daily_cost_ceiling_usd: 2.00
  expected_schema_version: 10
  triage_enabled: true
  citation_chain_enabled: true
  triage_threshold: 0.4
  triage_model: "claude-sonnet-4-6"
  scout_base_url: "https://pubmed.ncbi.nlm.nih.gov"
  per_page: 5                 # 5 papers/term * 10 terms = 50/night max; matches PubMedFetcher._MAX_RESULTS_CAP
  max_pages: 1                # McpFetcher doesn't paginate; this is informational
  tier_1_terms:
    - "canine cognition"
    - "dog behavior training"
    - "BJJ injury prevention"
    - "MMA biomechanics injury"
    - "strength training hypertrophy meta-analysis"
    - "exercise physiology performance"
    - "flow state athletes neural correlates"
    - "psychological resilience grit"
    - "working dog learning"
    - "operant conditioning canine"
  tier_2_terms: []

